name: Build

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)
      - 'test-deployment*'
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Verify code quality
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test
        
      - name: Run E2E tests
        run: npm run test:e2e

  # Job 2: Build Executables for all platforms
  build-app:
    name: Build ${{ matrix.os }}
    needs: check
    if:  # Run if tagged commit or push to test-deployment branch
      github.event_name == 'push' && (
        startsWith(github.ref, 'refs/tags/v') ||
        startsWith(github.ref, 'refs/tags/test-deployment') ||
        github.ref == 'refs/heads/test-deployment'
      )

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build for Windows
        if: matrix.os == 'windows-latest'
        run: npm run build:win -- --publish never

      - name: Build for macOS
        if: matrix.os == 'macos-latest'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run build:mac -- --publish never
      - name: Test .dmg Installation
        if: matrix.os == 'macos-latest'
        run: |
          # Attach the .dmg file
          DMG_PATH=$(find dist -name "*.dmg")
          hdiutil attach "$DMG_PATH"
          
          # Debug: List contents of the mounted volume
          VOLUME_PATH="$(find /Volumes -maxdepth 1 -type d -name "Git Visor*" | head -n 1)"
          ls -al "$VOLUME_PATH/"
          
          # Copy the app to Applications folder
          cp -R "$VOLUME_PATH/Git Visor.app" /Applications/
          
          # Open the app to verify it launches
          open "/Applications/Git Visor.app"
          
          # Wait for a few seconds to ensure it runs
          sleep 10
          
          # Check if the app is running
          pgrep -f "Git Visor" || (echo "App failed to launch" && exit 1)
          
          # Detach the .dmg
          hdiutil detach "$VOLUME_PATH"
      - name: Test .exe Installation
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # Find NSIS installer artifact
          $installer = Get-ChildItem -Path dist -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "No NSIS installer found in dist/"
          }

          Write-Host "Installing from: $($installer.FullName)"
          # NSIS silent install
          Start-Process -FilePath $installer.FullName -ArgumentList "/S" -Wait

          # Default electron-builder NSIS install path for your productName
          $installedExe = Join-Path $env:LOCALAPPDATA "Programs\Git Visor\Git Visor.exe"
          if (-not (Test-Path $installedExe)) {
            throw "Installed app not found at: $installedExe"
          }

          Write-Host "Launching installed app: $installedExe"
          $proc = Start-Process -FilePath $installedExe -PassThru
          Start-Sleep -Seconds 10

          if ($proc.HasExited) {
            throw "Installed app exited too early"
          }

          Stop-Process -Id $proc.Id -Force